name: Publish Public Mirror

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: public-mirror
  cancel-in-progress: true

jobs:
  publish-public-mirror:
    if: github.repository == 'marvinvista/revenue-swarms-private'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          PUBLIC_MIRROR_SSH_KEY: ${{ secrets.PUBLIC_MIRROR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$PUBLIC_MIRROR_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Publish snapshot to public repo
        env:
          PUBLIC_REPO: git@github.com:marvinvista/revenue-swarms.git
          PUBLIC_BRANCH: main
          PUBLISH_MESSAGE: Public snapshot
        run: bash scripts/publish_public_mirror.sh
